<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maa Sharda Classes</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Professional Header Styling */
        .header {
            background-color: #111;
            padding: 20px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #ffcc00; /* Gold accent for education */
            margin-bottom: 40px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            background: #ffcc00;
            color: #000;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-name {
            font-size: 32px;
            font-weight: bold;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .slogan {
            font-size: 14px;
            color: #888;
            display: block;
        }

        /* Main Content Grid */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .folder-button {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid #333;
            color: white;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .folder-button:hover {
            border-color: #ffcc00;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
        }

        .folder-button i {
            margin-bottom: 20px;
            width: 70px;
            height: 70px;
            color: #ffcc00; /* Gold icons for a premium look */
        }

        .folder-button span {
            font-size: 40px;
            font-weight: 800;
            text-align: center;
        }

        @media (max-width: 1024px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
            .brand-name { font-size: 24px; }
        }

        @media (max-width: 600px) {
            .grid-container { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
