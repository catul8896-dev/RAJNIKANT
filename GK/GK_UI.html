<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAA SHARDA CLASSES - GK Dashboard</title>
<style>
    :root {
        --bg-dark: #0a0a0a;
        --card-bg: #1e1e1e;
        --gold: #ffcc00;
        --white: #ffffff;
        --green: #28a745;
    }

    body {
        font-family: 'Arial Black', sans-serif;
        background-color: var(--bg-dark);
        color: var(--white);
        margin: 0;
        padding: 40px;
        text-align: center;
    }

    header {
        border-bottom: 4px solid var(--gold);
        margin-bottom: 50px;
        padding-bottom: 20px;
    }

    h1 {
        font-size: 70px;
        color: var(--gold);
        margin: 0;
    }

    p.subtitle {
        font-size: 30px;
        color: #ccc;
    }

    /* बटन ग्रिड लेआउट */
    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
        max-width: 1200px;
        margin: 0 auto;
    }

    /* एंकर टैग को बटन जैसा स्टाइल दिया गया है */
    .day-link {
        display: block;
        background-color: var(--card-bg);
        color: var(--white);
        text-decoration: none; /* अंडरलाइन हटाने के लिए */
        font-size: 40px; /* आपकी मांग के अनुसार बड़ा साइज़ */
        font-weight: bold;
        padding: 40px 20px;
        border: 4px solid var(--gold);
        border-radius: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 10px 0px #000;
    }

    .day-link:hover {
        background-color: var(--green);
        transform: translateY(-5px);
        box-shadow: 0 5px 0px #000;
        border-color: var(--white);
    }

    .day-link:active {
        transform: translateY(5px);
        box-shadow: 0 0px 0px #000;
    }

    footer {
        margin-top: 80px;
        font-size: 28px;
        border-top: 2px solid #333;
        padding-top: 20px;
        color: var(--gold);
    }
</style>
</head>
<body>

    <header>
        <h1>माँ शारदा क्लासेस</h1>
        <p class="subtitle">सामान्य ज्ञान (GK) डेली प्रैक्टिस पोर्टल</p>
    </header>

    <div class="grid-container">
        <!-- यहाँ 'a' टैग्स का उपयोग किया गया है जो अलग फाइलों को खोलेंगे -->
        <a href="gk_day_1.html" class="day-link">DAY 1 GK</a>
        <a href="gk_day_2.html" class="day-link">DAY 2 GK</a>
        <a href="gk_day_3.html" class="day-link">DAY 3 GK</a>
        <a href="gk_day_4.html" class="day-link">DAY 4 GK</a>
        <a href="gk_day_5.html" class="day-link">DAY 5 GK</a>
        <a href="gk_day_6.html" class="day-link">DAY 6 GK</a>
        <a href="gk_day_7.html" class="day-link">DAY 7 GK</a>
        <a href="gk_day_8.html" class="day-link">DAY 8 GK</a>
        <a href="gk_day_9.html" class="day-link">DAY 9 GK</a>
    </div>

    <footer>
        स्थान: टुनटुन मोड़ मार्केट | शिक्षा के प्रति समर्पित
    </footer>

</body>
</html>
