<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAA SHARDA CLASSES - GK Dashboard</title>
<style>
    :root {
        --bg-dark: #0a0a0a;
        --card-bg: #1e1e1e;
        --gold: #ffcc00;
        --white: #ffffff;
        --green: #28a745;
        --red: #dc3545;
    }

    body {
        font-family: 'Arial Black', sans-serif;
        background-color: var(--bg-dark);
        color: var(--white);
        margin: 0;
        padding: 40px;
        text-align: center;
    }

    header {
        border-bottom: 4px solid var(--gold);
        margin-bottom: 50px;
        padding-bottom: 20px;
    }

    h1 { font-size: 70px; color: var(--gold); margin: 0; }
    p.subtitle { font-size: 30px; color: #ccc; }

    /* मास्टर क्विज बटन स्टाइल */
    .master-quiz-btn {
        display: block;
        width: 90%;
        max-width: 1000px;
        margin: 0 auto 50px auto;
        background-color: var(--red);
        color: var(--white);
        text-decoration: none;
        font-size: 50px;
        font-weight: bold;
        padding: 30px;
        border: 6px solid var(--gold);
        border-radius: 20px;
        text-transform: uppercase;
        animation: blink 1.5s infinite;
    }

    @keyframes blink { 50% { opacity: 0.8; transform: scale(1.02); } }

    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 30px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .day-link {
        display: block;
        background-color: var(--card-bg);
        color: var(--white);
        text-decoration: none; 
        font-size: 40px; 
        font-weight: bold;
        padding: 40px 20px;
        border: 4px solid var(--gold);
        border-radius: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 10px 0px #000;
        cursor: pointer;
    }

    .day-link:hover {
        background-color: var(--green);
        transform: translateY(-5px);
        box-shadow: 0 5px 0px #000;
        border-color: var(--white);
    }
</style>
</head>
<body>

    <header>
        <h1>माँ शारदा क्लासेस</h1>
        <p class="subtitle">सामान्य ज्ञान (GK) डेली प्रैक्टिस पोर्टल</p>
    </header>

    <a href="./MASTER-GK/master-gkui.html" class="master-quiz-btn">🔥 MASTER QUIZ TEST (सभी दिन) 🔥</a>

    <div class="grid-container" id="quiz-dashboard"></div>

    <footer style="margin-top:50px; color:#666;">
        स्थान: टुनटुन मोड़ मार्केट | शिक्षा के प्रति समर्पित
    </footer>

    <script>
        const START_DATE = "2026-05-14";
        const FOLDER_NAME = "DAYS-GK";

        const container = document.getElementById('quiz-dashboard');
        const today = new Date();
        const start = new Date(START_DATE);
        const timeDiff = today.getTime() - start.getTime();
        const daysPassed = Math.floor(timeDiff / (1000 * 3600 * 24)) + 1;

        if (daysPassed > 0) {
            for (let i = 1; i <= daysPassed; i++) {
                let targetDate = new Date(START_DATE);
                targetDate.setDate(targetDate.getDate() + (i - 1));
                let mm = String(targetDate.getMonth() + 1).padStart(2, '0');
                let dd = String(targetDate.getDate()).padStart(2, '0');
                let yyyy = targetDate.getFullYear();
                let displayDateStr = `${dd}.${mm}.${yyyy}`;      

                let aTag = document.createElement('a');
                aTag.className = 'day-link';
                aTag.href = `${FOLDER_NAME}/day${i}x.html`;
                
                aTag.innerHTML = (i === daysPassed) ? 
                    `DAY ${i} GK (TODAY) <br><span style="font-size:25px; color:#ffcc00;">${displayDateStr}</span>` : 
                    `DAY ${i} GK <br><span style="font-size:25px; color:#ffcc00;">${displayDateStr}</span>`;

                container.appendChild(aTag);
            }
        }
    </script>
</body>
</html>
