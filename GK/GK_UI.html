<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAA SHARDA CLASSES - GK Dashboard</title>
<style>
    :root {
        --bg-dark: #0a0a0a;
        --card-bg: #1e1e1e;
        --gold: #ffcc00;
        --white: #ffffff;
        --green: #28a745;
        --gray: #444444;
    }

    body {
        font-family: 'Arial Black', sans-serif;
        background-color: var(--bg-dark);
        color: var(--white);
        margin: 0;
        padding: 40px;
        text-align: center;
    }

    header {
        border-bottom: 4px solid var(--gold);
        margin-bottom: 50px;
        padding-bottom: 20px;
    }

    h1 {
        font-size: 70px;
        color: var(--gold);
        margin: 0;
    }

    p.subtitle {
        font-size: 30px;
        color: #ccc;
    }

    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 30px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .day-link {
        display: block;
        background-color: var(--card-bg);
        color: var(--white);
        text-decoration: none; 
        font-size: 40px; 
        font-weight: bold;
        padding: 40px 20px;
        border: 4px solid var(--gold);
        border-radius: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 10px 0px #000;
        cursor: pointer;
    }

    .day-link:hover {
        background-color: var(--green);
        transform: translateY(-5px);
        box-shadow: 0 5px 0px #000;
        border-color: var(--white);
    }

    .day-link.locked {
        background-color: var(--gray) !important;
        border-color: #666 !important;
        color: #aaa !important;
        box-shadow: none !important;
        transform: none !important;
        opacity: 0.6;
    }
</style>
</head>
<body>

    <header>
        <h1>माँ शारदा क्लासेस</h1>
        <p class="subtitle">सामान्य ज्ञान (GK) डेली प्रैक्टिस पोर्टल</p>
    </header>

    <div class="grid-container" id="quiz-dashboard"></div>

    <footer>
        स्थान: टुनटुन मोड़设备 | शिक्षा के प्रति समर्पित
    </footer>

    <script>
        // ================= CONFIGURATION (अपनी सुविधानुसार बदलें) =================
        const START_DATE = "2026-05-14"; // DAY 1 की तारीख
        const TOTAL_DAYS = 9;            // कुल कितने दिन के बटन चाहिए
        const FOLDER_NAME = "DAYS-GK";   // आपके फोल्डर का नाम
        
        // टिप: अगर आपकी सभी फाइलों के नाम में 'x' लगा है (जैसे day1x, day2x, day3x), तो इसे true रखें।
        // अगर नाम बिना 'x' के हैं (जैसे day1, day2, day3), तो इसे false कर दें।
        const USE_X_IN_ALL_FILES = true; 
        // ===================================================================

        const today = new Date();
        const currentDateStr = today.getFullYear() + '-' + 
                               String(today.getMonth() + 1).padStart(2, '0') + '-' + 
                               String(today.getDate()).padStart(2, '0');

        const container = document.getElementById('quiz-dashboard');

        for (let i = 1; i <= TOTAL_DAYS; i++) {
            
            let targetDate = new Date(START_DATE);
            targetDate.setDate(targetDate.getDate() + (i - 1));
            
            let yyyy = targetDate.getFullYear();
            let mm = String(targetDate.getMonth() + 1).padStart(2, '0');
            let dd = String(targetDate.getDate()).padStart(2, '0');
            
            let targetDateStr = `${yyyy}-${mm}-${dd}`;       
            let displayDateStr = `${dd}.${mm}.${yyyy}`;      

            // नया डायनेमिक नामकरण लॉजिक
            let fileName = USE_X_IN_ALL_FILES ? `day${i}x.html` : `day${i}.html`;
            let finalHref = `${FOLDER_NAME}/${fileName}`;

            let aTag = document.createElement('a');
            aTag.className = 'day-link';
            aTag.innerHTML = `DAY ${i} GK <br><span style="font-size:25px; color:#ffcc00;">${displayDateStr}</span>`;

            if (currentDateStr >= targetDateStr) {
                aTag.href = finalHref;
            } else {
                aTag.classList.add('locked');
                aTag.onclick = function(e) {
                    e.preventDefault(); 
                    alert(`यह टेस्ट अभी चालू नहीं हुआ है! कृपया ${displayDateStr} को आइएगा।`);
                };
            }

            container.appendChild(aTag);
        }
    </script>

</body>
</html>
