<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 1 - Learning Mode Only</title>

    <style>
        /* [CORE STYLES - HIGH CONTRAST] */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-weight: bold; /* बड़ी टीवी स्क्रीन पर स्पष्टता के लिए */
        }

        body {
            background-color: #000000; /* सिग्नेचर प्योर ब्लैक बैकग्राउंड */
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #ffffff;
            font-size: 35px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* TOP NAVIGATION BAR */
        .top-nav {
            border-bottom: 4px solid #ffcc00;
            padding-bottom: 15px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            background-color: #111111;
            color: #ffcc00;
            border: 2px solid #ffcc00;
            padding: 8px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 28px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .back-btn:hover {
            background-color: #ffcc00;
            color: #000000;
        }

        .nav-title {
            font-size: 42px;
            color: #ffcc00;
            text-transform: uppercase;
        }

        /* WORKSPACE DISPLAY AREA */
        .portal-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* 🎯 SINGLE ROW SINGLE BUTTON CONTROL */
        .single-button-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* कड़क Day 1 एक्शन बटन */
        .day-action-button {
            background: linear-gradient(145deg, #1c1c1c, #0a0a0a);
            border: 4px solid #ff0055; /* हाइकॉन्ट्रास्ट पिंक/रेड बॉर्डर */
            border-radius: 20px;
            padding: 30px 50px;
            width: 100%;
            max-width: 800px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .day-action-button:hover {
            border-color: #ffcc00; /* होवर होने पर पीला बॉर्डर */
            background: #111111;
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 204, 0, 0.2);
        }

        .btn-left-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-align: left;
        }

        .day-badge {
            font-size: 45px;
            color: #ffcc00;
        }

        .date-badge {
            font-size: 28px;
            color: #aaaaaa;
        }

        /* सर आपकी सिग्नेचर ब्रांडिंग की स्टाइलिंग */
        .teacher-signature {
            display: block;
            font-size: 24px;
            color: #ffcc00; /* चमकीला पीला रंग */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            border-top: 1px dashed #333333;
            padding-top: 5px;
        }

        /* लोकल SVG बुक आइकॉन */
        .day-action-button svg {
            stroke: #ffcc00;
            fill: none;
            stroke-width: 2;
            width: 70px;
            height: 70px;
        }

        /* 📱 मोबाइल रिस्पॉन्सिव */
        @media (max-width: 768px) {
            body { font-size: 26px; padding: 10px; }
            .nav-title { font-size: 30px; }
            .day-badge { font-size: 34px; }
            .date-badge { font-size: 22px; }
            .teacher-signature { font-size: 18px; }
            .day-action-button svg { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="english-days-ui.html" class="back-btn">❮ Back</a>
        <div class="nav-title">English Portal - Classroom Learning Mode</div>
    </div>

    <div class="portal-container">
        
        <div class="single-button-row">
            <a href="CLASS10/ENGLISH/CHAPTERS/CHAPTER2/day1x.html" class="day-action-button" id="day1-btn">
                <div class="btn-left-content">
                    <span class="day-badge">DAY 1: START LEARNING</span>
                    <span class="date-badge">Date: 21/05/2026 • English Translation</span>
                    <span class="teacher-signature">By Rajnikant Chauhan Sir</span>
                </div>
                <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </a>
        </div>



        <div class="single-button-row">
            <a href="english/grammar/translation_day1.html" class="day-action-button" id="day2-btn">
                <div class="btn-left-content">
                    <span class="day-badge">DAY 2: START LEARNING</span>
                    <span class="date-badge">Date: 21/05/2026 • English Translation</span>
                    <span class="teacher-signature">By Rajnikant Chauhan Sir</span>
                </div>
                <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </a>
        </div>
        

    </div>

</body>
</html>
